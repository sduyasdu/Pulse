function Icon({ children, size = 14, color = "#000", className = "" }) {
  return <span className={className} style={{ fontSize: size, color, lineHeight: 1, display: "inline-block" }}>{children}</span>;
}

// Reusable attachments block (feature or subtask). Links open in a new tab.
function Attachments({ items, onAdd, onDelete, compact }) {
  const [title, setTitle] = React.useState("");
  const [url, setUrl] = React.useState("");
  const fileRef = React.useRef(null);
  const submit = () => { if (url.trim()) { onAdd(title, url); setTitle(""); setUrl(""); } };
  const onFiles = (e) => {
    const files = Array.from(e.target.files || []);
    files.forEach((f) => { const reader = new FileReader(); reader.onload = () => onAdd(f.name, reader.result, true); reader.readAsDataURL(f); });
    e.target.value = "";
  };
  return (
    <div>
      {!compact && <span className="mono text-xs" style={{ color: "#64748B" }}>ATTACHMENTS {(items || []).length > 0 && `(${items.length})`}</span>}
      <div className={`flex flex-col gap-1 ${compact ? "" : "mt-1.5"}`}>
        {(items || []).map((a) => (
          <div key={a.id} className="flex items-center gap-1.5 rounded px-2 py-1" style={{ background: "#F8FAFC", border: "1px solid #EEF1F4" }}>
            <Icon size={12} color="#D85A28">{a.isData ? "📄" : "🔗"}</Icon>
            <a href={a.url} target="_blank" rel="noopener noreferrer" download={a.isData ? a.title : undefined} className="text-xs flex-1 truncate" style={{ color: "#123359", textDecoration: "none" }} title={a.title}>{a.title}</a>
            <button onClick={() => onDelete(a.id)} title="Remove attachment"><Icon size={11} color="#64748B">✕</Icon></button>
          </div>
        ))}
        {(items || []).length === 0 && !compact && <span className="mono text-xs" style={{ color: "#78859A" }}>No attachments — upload a file or paste a link.</span>}
      </div>
      <div className="flex gap-1 mt-1.5">
        <input value={title} onChange={(e) => setTitle(e.target.value)} placeholder="Title" className="text-xs border rounded px-1.5 py-1" style={{ borderColor: "#E2DFD9", width: compact ? 56 : 80, minWidth: 0 }} />
        <input value={url} onChange={(e) => setUrl(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") submit(); }} placeholder="Paste URL…" className="text-xs border rounded px-1.5 py-1 flex-1" style={{ borderColor: "#E2DFD9", minWidth: 0 }} />
        <button onClick={submit} title="Add link" className="mono text-xs px-2 rounded" style={{ background: "#F7E8DA", color: "#D85A28" }}>+</button>
        <button onClick={() => fileRef.current && fileRef.current.click()} title="Upload file" className="mono text-xs px-2 rounded" style={{ background: "#EFF6FF", color: "#2563EB" }}>⤴</button>
        <input ref={fileRef} type="file" multiple onChange={onFiles} style={{ display: "none" }} />
      </div>
    </div>
  );
}

const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const DAY_MS = 86400000;

// hex (#rrggbb) + alpha -> rgba() string
function hexA(hex, a) {
  if (!hex) return `rgba(100,116,139,${a})`;
  const n = parseInt(hex.slice(1), 16);
  return `rgba(${(n >> 16) & 255},${(n >> 8) & 255},${n & 255},${a})`;
}

// Graph Effort config (global): each vertical step of GRAPH.stepPx pixels represents
// GRAPH.workPerStep units of "work" (parallel work hours). Height encodes work discretely.
const GRAPH = { stepPx: 16, workPerStep: 1 };
// Work units implied by a box's height field (box.work), snapped to whole steps.
const workOf = (box) => {
  const w = box.work != null ? box.work : (box.effort != null ? box.effort : 1);
  return Math.max(GRAPH.workPerStep, Math.round(w / GRAPH.workPerStep) * GRAPH.workPerStep);
};
const boxHeight = (box) => {
  const hasChildren = Array.isArray(box.children) && box.children.length > 0;
  const expanded = hasChildren && !box.collapsed;
  const steps = clamp(workOf(box) / GRAPH.workPerStep, 1, 24);
  const bodyHeight = 18 + steps * GRAPH.stepPx;
  return expanded ? 30 + box.children.length * 27 + 10 : 30 + bodyHeight;
};

// Assign overlapping assignment bars to stacked vertical lanes so they don't collide.
function stackRows(rows) {
  const sorted = [...rows].sort((a, b) => a.start - b.start);
  const laneEnds = []; // last end-day occupied per lane
  return sorted.map((row) => {
    let lane = laneEnds.findIndex((end) => row.start >= end);
    if (lane === -1) { lane = laneEnds.length; laneEnds.push(0); }
    laneEnds[lane] = row.start + row.duration;
    return { ...row, lane };
  });
}

function InfiniteCanvasPrototype() {
  const baseDate = useMemo(() => { const d = new Date(); d.setHours(0, 0, 0, 0); return d; }, []);
  const dateForDay = useCallback((day) => new Date(baseDate.getTime() + day * DAY_MS), [baseDate]);
  const dayIndex = useCallback((date) => Math.round((date.getTime() - baseDate.getTime()) / DAY_MS), [baseDate]);
  const fmtDate = useCallback((day) => dateForDay(day).toLocaleDateString("en-US", { month: "short", day: "numeric" }), [dateForDay]);
  // Weekend awareness: day-of-week for an absolute day index (0=Sun..6=Sat).
  const dowOf = useCallback((day) => dateForDay(day).getDay(), [dateForDay]);
  const isWeekend = useCallback((day) => { const w = dowOf(day); return w === 0 || w === 6; }, [dowOf]);
  // Count business days within a calendar span [startDay, startDay+span).
  const businessInSpan = useCallback((startDay, span) => {
    let c = 0; for (let d = 0; d < span; d++) if (!isWeekend(startDay + d)) c++; return c;
  }, [isWeekend]);
  // Calendar span needed to fit `businessDays` working days from startDay.
  // If useWeekends is true, weekends count as working days (span === businessDays).
  const businessToSpan = useCallback((startDay, businessDays, useWeekends) => {
    const need = Math.max(1, Math.ceil(businessDays));
    if (useWeekends) return need;
    let counted = 0, span = 0;
    while (counted < need && span < 4000) { if (!isWeekend(startDay + span)) counted++; span++; }
    return Math.max(1, span);
  }, [isWeekend]);
  // Working days represented by a box (its calendar span, minus weekends unless the flag is on).
  const workingDaysOf = useCallback((box) => box.useWeekends ? box.duration : businessInSpan(box.x, box.duration), [businessInSpan]);

  const [boxes, setBoxes] = useState(INITIAL_BOXES);
  const [resources, setResources] = useState(INITIAL_RESOURCES);
  const [resourceTypes, setResourceTypes] = useState(INITIAL_RESOURCE_TYPES);

  const [offsetX, setOffsetX] = useState(BASE_DAY_WIDTH * 6);

  const [panArmed, setPanArmed] = useState(false); // long-press armed
  const [dragOverBoxId, setDragOverBoxId] = useState(null);
  const [addingResource, setAddingResource] = useState(false);
  const [filterResource, setFilterResource] = useState(null); // resource id to filter the canvas + summary by
  const [assignFilterRes, setAssignFilterRes] = useState("all"); // lower chart: filter rows by resource
  const [assignFilterStatus, setAssignFilterStatus] = useState("all"); // lower chart: filter bars by status
  const [assignHideIdle, setAssignHideIdle] = useState(false); // lower chart: hide people with no assignments
  const [assignCompact, setAssignCompact] = useState(false); // lower chart: show only % per resource
  const [expandedSubs, setExpandedSubs] = useState({}); // which subtasks are expanded in the form
  const [featureQuery, setFeatureQuery] = useState(""); // search features by text
  const [featureStatusFilter, setFeatureStatusFilter] = useState("all"); // filter features by status

  const [assignAllocFilter, setAssignAllocFilter] = useState("all"); // resource view: all | under | over
  const [assignPanelH, setAssignPanelH] = useState(280); // px height of the resource assignment panel
  const [showDelays, setShowDelays] = useState(false); // draw planned→actual delay lines
  const [graphStepPx, setGraphStepPx] = useState(GRAPH.stepPx);       // px per height step
  const [graphWorkPerStep, setGraphWorkPerStep] = useState(GRAPH.workPerStep); // work units per step
  const [showGraphSettings, setShowGraphSettings] = useState(false);
  useEffect(() => { GRAPH.stepPx = graphStepPx; GRAPH.workPerStep = graphWorkPerStep; setBoxes((bs) => bs.slice()); }, [graphStepPx, graphWorkPerStep]);
  const [boardName, setBoardName] = useState(""); // user label for this board, e.g. "de conciliaciones"

  useEffect(() => { document.title = boardName.trim() ? `${boardName.trim()} — Pulse` : "Pulse — Visual Project Planning"; }, [boardName]);

  const containerRef = useRef(null);
  const dragRef = useRef(null);

  useEffect(() => {
    const el = containerRef.current;
    if (!el) return;
    const ro = new ResizeObserver((entries) => { for (const e of entries) setContainerWidth(e.contentRect.width); });
    ro.observe(el);
    setContainerWidth(el.clientWidth);
    return () => ro.disconnect();
  }, []);

  const dayWidth = BASE_DAY_WIDTH * scale * DENSITY_DAY_PX[density];
  const xForDay = useCallback((day) => offsetX + day * dayWidth, [offsetX, dayWidth]);

  const startDay = Math.floor(-offsetX / dayWidth) - 2;
  const endDay = Math.ceil((containerWidth / viewZoom - offsetX) / dayWidth) + 2;

  // Weekend day indices in view (only shaded in day view, where a day is wide enough to matter).
  const weekends = useMemo(() => {
    if (density !== "day") return [];
    const out = [];
    for (let d = startDay; d <= endDay; d++) if (isWeekend(d)) out.push(d);
    return out;
  }, [density, startDay, endDay, isWeekend]);

  // ---- Timeline ticks: genuinely different per density ---------------------
  // primary = the labelled band along the top; secondary = fine gridlines
  const timeline = useMemo(() => {
    const primary = [];   // { left(day), right(day), label }
    const secondary = []; // day indices for gridlines
    let guard = 0;

    if (density === "day") {
      // primary band = months; secondary gridlines = each day
      let d = dateForDay(startDay);
      d = new Date(d.getFullYear(), d.getMonth(), 1);
      while (dayIndex(d) < endDay && guard < 80) {
        const next = new Date(d.getFullYear(), d.getMonth() + 1, 1);
        primary.push({ left: dayIndex(d), right: dayIndex(next), label: d.toLocaleDateString("en-US", { month: "long", year: "numeric" }) });
        d = next; guard++;
      }
      for (let day = startDay; day <= endDay; day++) {
        secondary.push({ day, label: dateForDay(day).toLocaleDateString("en-US", { day: "numeric" }) });
      }
    } else if (density === "week") {
      // primary band = months; secondary gridlines = each week (Mon)
      let d = dateForDay(startDay);
      d = new Date(d.getFullYear(), d.getMonth(), 1);
      while (dayIndex(d) < endDay && guard < 80) {
        const next = new Date(d.getFullYear(), d.getMonth() + 1, 1);
        primary.push({ left: dayIndex(d), right: dayIndex(next), label: d.toLocaleDateString("en-US", { month: "long", year: d.getMonth() === 0 ? "numeric" : undefined }) });
        d = next; guard++;
      }
      const kStart = Math.floor(startDay / 7) - 1;
      const kEnd = Math.ceil(endDay / 7) + 1;
      // find the Monday on/just before startDay, then step by 7 days
      let mon = dateForDay(startDay);
      const shift = (mon.getDay() + 6) % 7; // days since Monday (Mon=0 … Sun=6)
      mon = new Date(mon.getFullYear(), mon.getMonth(), mon.getDate() - shift);
      let g2 = 0;
      while (dayIndex(mon) <= endDay && g2 < 90) {
        const dm = `${mon.getDate()}/${mon.getMonth() + 1}`; // day/month
        secondary.push({ day: dayIndex(mon), label: dm });
        mon = new Date(mon.getFullYear(), mon.getMonth(), mon.getDate() + 7); g2++;
      }
    } else {
      // month view: primary band = quarters/years; secondary gridlines = each month
      let d = dateForDay(startDay);
      d = new Date(d.getFullYear(), 0, 1);
      while (dayIndex(d) < endDay && guard < 40) {
        const next = new Date(d.getFullYear() + 1, 0, 1);
        primary.push({ left: dayIndex(d), right: dayIndex(next), label: String(d.getFullYear()) });
        d = next; guard++;
      }
      let m = dateForDay(startDay);
      m = new Date(m.getFullYear(), m.getMonth(), 1);
      let g2 = 0;
      while (dayIndex(m) < endDay && g2 < 80) {
        secondary.push({ day: dayIndex(m), label: m.toLocaleDateString("en-US", { month: "short" }) });
        m = new Date(m.getFullYear(), m.getMonth() + 1, 1); g2++;
      }
    }
    return { primary, secondary };
  }, [density, startDay, endDay, dateForDay, dayIndex]);

  // Period buckets for the per-day/week/month allocation strip, each covering
  // [start, end) in day-indices, aligned to the same timeline as the canvas.
  const periods = useMemo(() => {
    const out = [];
    if (density === "day") {
      for (let day = startDay; day <= endDay; day++) out.push({ start: day, end: day + 1, label: dateForDay(day).toLocaleDateString("en-US", { day: "numeric" }) });
    } else if (density === "week") {
      let mon = dateForDay(startDay);
      const shift = (mon.getDay() + 6) % 7;
      mon = new Date(mon.getFullYear(), mon.getMonth(), mon.getDate() - shift);
      let g = 0;
      while (dayIndex(mon) <= endDay && g < 90) {
        const s = dayIndex(mon);
        out.push({ start: s, end: s + 7, label: `${mon.getDate()}/${mon.getMonth() + 1}` });
        mon = new Date(mon.getFullYear(), mon.getMonth(), mon.getDate() + 7); g++;
      }
    } else {
      let m = dateForDay(startDay);
      m = new Date(m.getFullYear(), m.getMonth(), 1);
      let g = 0;
      while (dayIndex(m) < endDay && g < 80) {
        const next = new Date(m.getFullYear(), m.getMonth() + 1, 1);
        out.push({ start: dayIndex(m), end: dayIndex(next), label: m.toLocaleDateString("en-US", { month: "short" }) });
        m = next; g++;
      }
    }
    return out;
  }, [density, startDay, endDay, dateForDay, dayIndex]);

  const contentHeight = useMemo(() => Math.max(CONTENT_MIN_HEIGHT, Math.max(...boxes.map((b) => b.y + boxHeight(b))) + 260, Math.max(0, ...epics.map((e) => e.y1)) + 120), [boxes, epics]);

  // For each epic, fit its extent (both axes) to the features it contains.
  const epicBandsRef = useRef([]);
  const EPIC_MIN_H = 90;
  const epicBands = useMemo(() => epics.map((ep) => {
    const feats = boxes.filter((b) => b.epicId === ep.id);
    const bh = (b) => epicsShrunk ? 26 : boxHeight(b); // shrunk boxes are title-only
    let minX, maxX, y0 = ep.y0, y1 = ep.y0 + (epicsShrunk ? 54 : EPIC_MIN_H);
    if (feats.length) {
      minX = Math.min(...feats.map((b) => b.x));
      maxX = Math.max(...feats.map((b) => b.x + b.duration));
      y0 = Math.min(ep.y0, ...feats.map((b) => b.y - 30));
      y1 = Math.max(y0 + (epicsShrunk ? 54 : EPIC_MIN_H), ...feats.map((b) => b.y + bh(b) + 12));
    }
    // manual overrides extend (but never clip) the auto-fit extent — ignored while shrunk
    if (!epicsShrunk) {
      if (ep.manualY0 != null) y0 = Math.min(y0, ep.manualY0);
      if (ep.manualY1 != null) y1 = Math.max(y1, ep.manualY1);
    }
    if (ep.manualMinX != null) minX = minX != null ? Math.min(minX, ep.manualMinX) : ep.manualMinX;
    if (ep.manualMaxX != null) maxX = maxX != null ? Math.max(maxX, ep.manualMaxX) : ep.manualMaxX;
    return { ...ep, minX, maxX, y0, y1, count: feats.length };
  }), [epics, boxes, epicsShrunk]);
  useEffect(() => { epicBandsRef.current = epicBands; }, [epicBands]);

  // ---- Panning: grab the background and drag back/forth through time ------
  // Horizontal drag scrubs the timeline across months (offsetX is unbounded);
  // vertical drag scrolls the canvas rows. Works immediately on press-drag,
  // and a long-press also arms an explicit "pan mode" for clarity.
  const handlePanMove = useCallback((e) => {
    const p = panRef.current; if (!p) return;
    if (!p.active) {
      // start panning as soon as the pointer moves past a small threshold
      if (Math.abs(e.clientX - p.startX) + Math.abs(e.clientY - p.startY) < 4) return;
      p.active = true;
      setIsPanning(true);
      if (longPressTimer.current) { clearTimeout(longPressTimer.current); longPressTimer.current = null; }
    }
    setOffsetX(p.origOffset + (e.clientX - p.startX) / (p.viewZoom || 1)); // horizontal → time (screen px ÷ zoom)
    if (p.scroller) p.scroller.scrollTop = p.origScroll - (e.clientY - p.startY); // vertical → rows
  }, []);

  const endPan = useCallback(() => {
    panRef.current = null;
    setIsPanning(false); setPanArmed(false);
    if (longPressTimer.current) { clearTimeout(longPressTimer.current); longPressTimer.current = null; }
    window.removeEventListener("pointermove", handlePanMove);
    window.removeEventListener("pointerup", endPan);
  }, [handlePanMove]);

  const handlePanPointerDown = (e) => {
    // Boxes and their handles call stopPropagation, so any event that reaches
    // here is on empty canvas background — begin a pan immediately.
    setSelectedId(null);
    try { e.currentTarget.setPointerCapture(e.pointerId); } catch (err) {}
    panRef.current = {
      pointerId: e.pointerId,
      startX: e.clientX, startY: e.clientY,
      origOffset: offsetX, active: false,
      scroller: containerRef.current,
      origScroll: containerRef.current ? containerRef.current.scrollTop : 0,
      viewZoom,
    };
    longPressTimer.current = setTimeout(() => { setPanArmed(true); }, 250);
    window.addEventListener("pointermove", handlePanMove);
    window.addEventListener("pointerup", endPan);
  };

  const handleWheel = useCallback((e) => {
    if (!(e.ctrlKey || e.metaKey)) return; // only zoom on pinch / ctrl+scroll; plain scroll passes through
    e.preventDefault();
    e.stopPropagation();
    const cont = containerRef.current; if (!cont) return;
    const rect = cont.getBoundingClientRect();
    const mouseX = e.clientX - rect.left + cont.scrollLeft;
    setViewZoom((zPrev) => {
      const worldX = mouseX / zPrev - offsetXRef.current;
      // trackpad pinch sends small deltas; scale factor proportional to delta
      const factor = Math.exp(-e.deltaY * 0.01);
      const next = clamp(Math.round(zPrev * factor * 100) / 100, 0.3, 2);
      setOffsetX(mouseX / next - worldX);
      return next;
    });
  }, []);

  // Register wheel + Safari gesture handlers non-passively so the browser's own
  // page-zoom never kicks in (which was making it hard to return to normal zoom).
  const offsetXRef = useRef(offsetX);
  useEffect(() => { offsetXRef.current = offsetX; }, [offsetX]);
  useEffect(() => {
    const cont = containerRef.current; if (!cont) return;
    const wheelOpt = { passive: false };
    cont.addEventListener("wheel", handleWheel, wheelOpt);
    const prevent = (ev) => ev.preventDefault();
    cont.addEventListener("gesturestart", prevent, wheelOpt);
    cont.addEventListener("gesturechange", prevent, wheelOpt);
    cont.addEventListener("gestureend", prevent, wheelOpt);
    return () => {
      cont.removeEventListener("wheel", handleWheel, wheelOpt);
      cont.removeEventListener("gesturestart", prevent, wheelOpt);
      cont.removeEventListener("gesturechange", prevent, wheelOpt);
      cont.removeEventListener("gestureend", prevent, wheelOpt);
    };
  }, [handleWheel]);

  // ---- Box drag / resize --------------------------------------------------
  const updateBox = (id, patch) => setBoxes((bs) => bs.map((b) => (b.id === id ? { ...b, ...patch } : b)));

  // ---- Subtask (child) helpers -------------------------------------------
  const addSubtask = (boxId) => {
    const cid = `c${Date.now()}`;
    setBoxes((bs) => bs.map((b) => b.id === boxId ? { ...b, collapsed: false, children: [...(b.children || []), { id: cid, title: "New subtask", status: "planned", resources: [], effort: 1 }] } : b));
    setExpandedSubs((s) => ({ ...s, [cid]: true }));
    return cid;
  };
  const updateSubtask = (boxId, cid, patch) => setBoxes((bs) => bs.map((b) => b.id === boxId ? { ...b, children: (b.children || []).map((c) => c.id === cid ? { ...c, ...patch } : c) } : b));
  const deleteSubtask = (boxId, cid) => setBoxes((bs) => bs.map((b) => b.id === boxId ? { ...b, children: (b.children || []).filter((c) => c.id !== cid) } : b));
  const toggleSubtaskResource = (boxId, cid, rid) => setBoxes((bs) => bs.map((b) => {
    if (b.id !== boxId) return b;
    return { ...b, children: (b.children || []).map((c) => {
      if (c.id !== cid) return c;
      const has = (c.resources || []).includes(rid);
      return { ...c, resources: has ? c.resources.filter((x) => x !== rid) : [...(c.resources || []), rid] };
    }) };
  }));

  // ---- Attachment helpers (link-based: title + URL, opens in a new tab) ----
  const normalizeUrl = (u) => { const t = (u || "").trim(); if (!t) return ""; return /^https?:\/\//i.test(t) ? t : `https://${t}`; };
  const addAttachment = (boxId, title, url, cid) => {
    const raw = (url || "").trim();
    const isData = /^data:/i.test(raw);
    const finalUrl = isData ? raw : normalizeUrl(raw);
    const att = { id: `at${Date.now()}${Math.floor(Math.random() * 1000)}`, title: (title || raw).trim().slice(0, 120), url: finalUrl, isData };
    if (!att.url) return;
    setBoxes((bs) => bs.map((b) => {
      if (b.id !== boxId) return b;
      if (!cid) return { ...b, attachments: [...(b.attachments || []), att] };
      return { ...b, children: (b.children || []).map((c) => c.id === cid ? { ...c, attachments: [...(c.attachments || []), att] } : c) };
    }));
  };
  const deleteAttachment = (boxId, attId, cid) => setBoxes((bs) => bs.map((b) => {
    if (b.id !== boxId) return b;
    if (!cid) return { ...b, attachments: (b.attachments || []).filter((a) => a.id !== attId) };
    return { ...b, children: (b.children || []).map((c) => c.id === cid ? { ...c, attachments: (c.attachments || []).filter((a) => a.id !== attId) } : c) };
  }));

  // Which epic band a box belongs to: test against the CURRENT (expanded) bands
  // so dropping onto the band as drawn works; any vertical overlap counts, and
  // the most-overlapping band wins when straddling two.
  const epicAtY = useCallback((yTop, h) => {
    const top = yTop, bot = yTop + h;
    let best = null, bestOverlap = 0;
    (epicBandsRef.current.length ? epicBandsRef.current : epics).forEach((ep) => {
      const overlap = Math.min(bot, ep.y1) - Math.max(top, ep.y0);
      if (overlap > 0 && overlap > bestOverlap) { bestOverlap = overlap; best = ep.id; } // must actually touch
    });
    return best;
  }, [epics]);

  const handleDragMove = useCallback((e) => {
    const d = dragRef.current; if (!d) return;
    const vz = d.viewZoom || 1;
    const dx = (e.clientX - d.startX) / vz;
    const dy = (e.clientY - d.startY) / vz;
    const deltaDays = Math.round(dx / d.dayWidth);

    if (d.kind === "move") {
      const ny = Math.max(6, d.orig.y + dy);
      const epicId = epicAtY(ny, boxHeight(d.orig));
      updateBox(d.id, { x: d.orig.x + deltaDays, y: ny, epicId });
      const epName = epicId ? (epics.find((ep) => ep.id === epicId) || {}).name : "no epic";
      setDimHint({ x: e.clientX, y: e.clientY, text: `${fmtDate(d.orig.x + deltaDays)} → ${fmtDate(d.orig.x + deltaDays + d.orig.duration)} · ${epName}` });
    } else if (d.kind === "resize-right") {
      const nd = Math.max(1, d.orig.duration + deltaDays);       // width = elapsed
      const wdNew = d.orig.useWeekends ? nd : businessInSpan(d.orig.x, nd);
      updateBox(d.id, { duration: nd });
      setDimHint({ x: e.clientX, y: e.clientY, text: `⟷ elapsed ${wdNew}wd` });
    } else if (d.kind === "resize-left") {
      let nx = d.orig.x + deltaDays, nd = d.orig.duration - deltaDays;
      if (nd < 1) { nd = 1; nx = d.orig.x + d.orig.duration - 1; }
      const wdNew = d.orig.useWeekends ? nd : businessInSpan(nx, nd);
      updateBox(d.id, { x: nx, duration: nd });
      setDimHint({ x: e.clientX, y: e.clientY, text: `⟷ elapsed ${wdNew}wd` });
    } else if (d.kind === "resize-effort") {
      // Dragging height changes WORK in discrete steps (Graph Effort config).
      const workOld = d.orig.work != null ? d.orig.work : 1;
      const stepsDelta = Math.round(dy / GRAPH.stepPx);
      const nw = Math.max(GRAPH.workPerStep, workOld + stepsDelta * GRAPH.workPerStep);
      updateBox(d.id, { work: nw });
      setDimHint({ x: e.clientX, y: e.clientY, text: `↕ work ${nw}` });
    }
  }, [fmtDate, epicAtY, epics]);

  const handleDragUp = useCallback(() => {
    dragRef.current = null; setDragId(null); setDimHint(null);
    window.removeEventListener("pointermove", handleDragMove);
    window.removeEventListener("pointerup", handleDragUp);
  }, [handleDragMove]);

  const startDrag = (kind, box, e) => {
    e.stopPropagation();
    setSelectedId(box.id); setRightTab("details"); setDragId(box.id);
    dragRef.current = { kind, id: box.id, startX: e.clientX, startY: e.clientY, orig: { ...box, altKey: e.altKey }, dayWidth, viewZoom, locked: !!box.effortLocked };
    window.addEventListener("pointermove", handleDragMove);
    window.addEventListener("pointerup", handleDragUp);
  };

  const toggleCollapsed = (id, e) => { e.stopPropagation(); updateBox(id, { collapsed: !boxes.find((b) => b.id === id).collapsed }); };

  // Manual epic band resizing via edge handles.
  const epicResizeRef = useRef(null);
  const startEpicResize = (edge, band, e) => {
    e.stopPropagation();
    try { e.currentTarget.setPointerCapture(e.pointerId); } catch (err) {}
    epicResizeRef.current = { edge, id: band.id, startX: e.clientX, startY: e.clientY, band: { ...band }, dayWidth, viewZoom };
    window.addEventListener("pointermove", onEpicResizeMove);
    window.addEventListener("pointerup", onEpicResizeUp);
  };
  const onEpicResizeMove = useCallback((e) => {
    const r = epicResizeRef.current; if (!r) return;
    const vz = r.viewZoom || 1;
    const dy = (e.clientY - r.startY) / vz;
    const dDays = Math.round(((e.clientX - r.startX) / vz) / r.dayWidth);
    const patch = {};
    if (r.edge.includes("top")) patch.manualY0 = Math.round(r.band.y0 + dy);
    if (r.edge.includes("bottom")) patch.manualY1 = Math.round(r.band.y1 + dy);
    if (r.edge.includes("left")) patch.manualMinX = (r.band.minX != null ? r.band.minX : 0) + dDays;
    if (r.edge.includes("right")) patch.manualMaxX = (r.band.maxX != null ? r.band.maxX : 0) + dDays;
    setEpics((es) => es.map((x) => x.id === r.id ? { ...x, ...patch } : x));
  }, []);
  const onEpicResizeUp = useCallback(() => {
    epicResizeRef.current = null;
    window.removeEventListener("pointermove", onEpicResizeMove);
    window.removeEventListener("pointerup", onEpicResizeUp);
  }, [onEpicResizeMove]);


  const addTask = () => {
    const cont = containerRef.current;
    const scrollTop = cont ? cont.scrollTop : 0;
    const visH = cont ? cont.clientHeight : 400;
    // horizontal center of the visible time window (world coords), vertical center of the scroll viewport
    const centerDay = Math.round((-offsetX + (containerWidth / viewZoom) / 2) / dayWidth);
    const y = Math.max(10, Math.round((scrollTop + visH / 2) / viewZoom) - 40);
    const id = `n${Date.now()}`;
    setBoxes((bs) => [...bs, { id, title: "New task", x: centerDay, y, duration: 8, effort: 2, status: "planned", resources: [], ai: false }]);
    setSelectedId(id); setRightTab("details");
  };

  const EPIC_PALETTE = ["#8B5CF6", "#3B82F6", "#14B8A6", "#22C55E", "#F59E0B", "#F43F5E", "#0EA5E9"];
  const addEpic = () => {
    const cont = containerRef.current;
    const scrollTop = cont ? cont.scrollTop : 0;
    const visH = cont ? cont.clientHeight : 400;
    const y0 = Math.max(10, Math.round((scrollTop + visH / 2) / viewZoom) - 60);
    const id = `ep${Date.now()}`;
    setEpics((es) => [...es, { id, name: "New epic", color: EPIC_PALETTE[es.length % EPIC_PALETTE.length], y0, y1: y0 + EPIC_MIN_H + 40 }]);
  };
  const updateEpic = (id, patch) => setEpics((es) => es.map((e) => (e.id === id ? { ...e, ...patch } : e)));

  // Assign a box to an epic AND move it into that epic's band vertically,
  // placing it below any features already there so it lands inside the lane.
  const moveToEpic = (boxId, epicId) => {
    setBoxes((bs) => {
      const box = bs.find((b) => b.id === boxId);
      if (!box) return bs;
      if (!epicId) return bs.map((b) => (b.id === boxId ? { ...b, epicId: null } : b));
      const ep = epics.find((e) => e.id === epicId);
      if (!ep) return bs.map((b) => (b.id === boxId ? { ...b, epicId } : b));
      // find a free y just under existing features of this epic, within the band
      const others = bs.filter((b) => b.id !== boxId && b.epicId === epicId);
      let ny = ep.y0 + 34; // leave room for the epic label
      if (others.length) ny = Math.max(ny, Math.max(...others.map((b) => b.y + boxHeight(b))) + 12);
      // keep it inside the base band if it fits; otherwise the band will grow to wrap it
      return bs.map((b) => (b.id === boxId ? { ...b, epicId, y: ny } : b));
    });
  };
  const deleteEpic = (id) => {
    setEpics((es) => es.filter((e) => e.id !== id));
    setBoxes((bs) => bs.map((b) => (b.epicId === id ? { ...b, epicId: null } : b)));
  };

  // Compact everything vertically to the minimum height with tidy margins:
  // stack each epic's features in a single column, pack the epic bands one after
  // another, then place any loose (no-epic) features below. Horizontal positions
  // (dates) are untouched — only y changes.
  const compactVertically = (bhFn) => {
    const boxH = bhFn || boxHeight;
    const LABEL_H = 30;   // headroom for the epic label inside the band
    const GAP = 12;       // vertical gap between lanes
    const EPIC_GAP = 24;  // gap between epic bands
    const TOP = 16;
    let cursor = TOP;
    const yById = {};

    // Pack features into lanes: two features share a lane (row) only if their
    // time spans don't overlap. Non-overlapping tasks rise to the top lanes.
    const packLanes = (feats) => {
      const sorted = [...feats].sort((a, b) => a.x - b.x || b.duration - a.duration);
      const laneEnds = []; // last occupied day per lane
      const laneOf = {};
      sorted.forEach((b) => {
        let lane = laneEnds.findIndex((end) => b.x >= end);
        if (lane === -1) { lane = laneEnds.length; laneEnds.push(0); }
        laneEnds[lane] = b.x + b.duration;
        laneOf[b.id] = lane;
      });
      // row height = tallest box in that lane
      const laneH = laneEnds.map((_, i) => Math.max(...sorted.filter((b) => laneOf[b.id] === i).map((b) => boxH(b)), 30));
      const laneTop = []; let acc = 0;
      laneH.forEach((h, i) => { laneTop[i] = acc; acc += h + GAP; });
      const totalH = acc > 0 ? acc - GAP : 0;
      return { laneOf, laneTop, totalH };
    };

    const ordered = [...epics].sort((a, b) => a.y0 - b.y0);
    const minH = boxH === boxHeight ? EPIC_MIN_H : 54;
    const newEpics = ordered.map((ep) => {
      const feats = boxes.filter((b) => b.epicId === ep.id);
      const y0 = cursor;
      const inner = y0 + LABEL_H;
      if (feats.length) {
        const { laneOf, laneTop } = packLanes(feats);
        feats.forEach((b) => { yById[b.id] = inner + laneTop[laneOf[b.id]]; });
      }
      const { totalH } = feats.length ? packLanes(feats) : { totalH: 0 };
      const y1 = Math.max(y0 + minH, inner + totalH + 10);
      cursor = y1 + EPIC_GAP;
      return { ...ep, y0, y1, manualY0: undefined, manualY1: undefined };
    });

    // loose features (no epic) packed into lanes below all bands
    const loose = boxes.filter((b) => !b.epicId);
    if (loose.length) {
      const { laneOf, laneTop } = packLanes(loose);
      loose.forEach((b) => { yById[b.id] = cursor + laneTop[laneOf[b.id]]; });
    }

    setEpics(newEpics);
    setBoxes((bs) => bs.map((b) => (yById[b.id] != null ? { ...b, y: yById[b.id] } : b)));
  };

  // Shrink/unshrink epics: title-only boxes AND a tightly compacted layout,
  // restoring the previous layout when unshrinking.
  const preShrinkRef = useRef(null);
  const toggleShrinkEpics = () => {
    if (!epicsShrunk) {
      preShrinkRef.current = { boxes: boxes.map((b) => ({ id: b.id, y: b.y })), epics: epics.map((e) => ({ id: e.id, y0: e.y0, y1: e.y1, manualY0: e.manualY0, manualY1: e.manualY1 })) };
      setEpicsShrunk(true);
      compactVertically(() => 26); // pack using the title-only height
    } else {
      const snap = preShrinkRef.current;
      if (snap) {
        const byBox = Object.fromEntries(snap.boxes.map((b) => [b.id, b.y]));
        const byEp = Object.fromEntries(snap.epics.map((e) => [e.id, e]));
        setBoxes((bs) => bs.map((b) => (byBox[b.id] != null ? { ...b, y: byBox[b.id] } : b)));
        setEpics((es) => es.map((e) => (byEp[e.id] ? { ...e, ...byEp[e.id] } : e)));
      }
      setEpicsShrunk(false);
    }
  };

  const deleteTask = (id) => {
    setBoxes((bs) => bs.filter((b) => b.id !== id));
    setSelectedId((cur) => (cur === id ? null : cur));
    setRightTab("usage");
  };

  // Zoom out (and scroll to start) so the whole roadmap — earliest task start to
  // latest task end — fits within the visible canvas width.
  const fitRoadmap = () => {
    if (boxes.length === 0) { setViewZoom(1); return; }
    const minDay = Math.min(...boxes.map((b) => b.x));
    const maxDay = Math.max(...boxes.map((b) => b.x + b.duration));
    const spanPx = (maxDay - minDay) * dayWidth + 80; // world px the roadmap occupies
    const avail = Math.max(200, containerWidth - 24);
    const z = clamp(Math.round((avail / spanPx) * 100) / 100, 0.2, 1);
    setViewZoom(z);
    setOffsetX(-minDay * dayWidth + 24); // bring the earliest task to the left edge
    if (containerRef.current) containerRef.current.scrollTop = 0;
  };

  const assignResource = (boxId, rid) => setBoxes((bs) => bs.map((b) => {
    if (b.id !== boxId || (b.resources || []).includes(rid)) return b;
    return { ...b, resources: [...(b.resources || []), rid], alloc: { ...(b.alloc || {}), [rid]: 100 } };
  }));

  // % time allocation helpers (default 100% when a resource is assigned)
  const allocOf = (box, rid) => (box.alloc && box.alloc[rid] != null) ? box.alloc[rid] : 100;
  const setAlloc = (boxId, rid, pct) => setBoxes((bs) => bs.map((b) => b.id === boxId ? { ...b, alloc: { ...(b.alloc || {}), [rid]: pct } } : b));
  const omit = (obj, key) => { const o = { ...(obj || {}) }; delete o[key]; return o; };

  const makeInitials = (name) => {
    const parts = name.trim().split(/\s+/).filter(Boolean);
    let init = (parts.length >= 2 ? parts[0][0] + parts[1][0] : name.slice(0, 2)).toUpperCase();
    let candidate = init, n = 1;
    while (resources.some((r) => r.id === candidate)) { candidate = init + n; n++; }
    return candidate;
  };
  const addResource = (name) => { if (!name.trim()) return; setResources((rs) => [...rs, { id: makeInitials(name), name: name.trim(), capacity: 100, type: resourceTypes[0] || null }]); };

  // Remove a resource everywhere: from the roster, from every box/subtask it's
  // assigned to, and from any alloc maps; clear the filter if it pointed here.
  const deleteResource = (rid) => {
    setResources((rs) => rs.filter((r) => r.id !== rid));
    setBoxes((bs) => bs.map((b) => {
      const nb = { ...b, resources: (b.resources || []).filter((x) => x !== rid), alloc: omit(b.alloc, rid) };
      if (Array.isArray(b.children)) nb.children = b.children.map((c) => ({ ...c, resources: (c.resources || []).filter((x) => x !== rid), alloc: omit(c.alloc, rid) }));
      return nb;
    }));
    setFilterResource((cur) => (cur === rid ? null : cur));
    setAssignFilterRes((cur) => (cur === rid ? "all" : cur));
  };

  // rows: every assignment of a resource to a box/subtask (for the view below the canvas)
  const assignmentsFor = (rid) => {
    const rows = [];
    boxes.forEach((b) => {
      if ((b.resources || []).includes(rid)) rows.push({ title: b.title, effort: b.effort, start: b.x, duration: b.duration, status: b.status, pct: allocOf(b, rid) });
      if (Array.isArray(b.children)) b.children.forEach((c) => { if ((c.resources || []).includes(rid)) rows.push({ title: c.title, effort: c.effort, parent: b.title, status: c.status, start: b.x, duration: b.duration, pct: (c.alloc && c.alloc[rid] != null) ? c.alloc[rid] : 100 }); });
    });
    return rows;
  };
  const resourceUsage = (rid) => assignmentsFor(rid).reduce((s, r) => s + r.effort, 0);

  // --- Effort model (man-days, 1 decimal) ----------------------------------
  const round1 = (v) => Math.round(v * 10) / 10;
  // Elapsed Time = the box length in working days (weekends excluded unless the flag is on).
  const elapsedOf = (box) => workingDaysOf(box);
  // Sum of allocation % across assigned resources (fraction, 1.5 = 150%), incl. subtasks.
  const allocSum = (box) => {
    let s = (box.resources || []).reduce((a, rid) => a + (allocOf(box, rid) / 100), 0);
    if (Array.isArray(box.children)) box.children.forEach((c) => {
      (c.resources || []).forEach((rid) => { s += ((c.alloc && c.alloc[rid] != null) ? c.alloc[rid] : 100) / 100; });
    });
    return s;
  };
  // Graph Effort = elapsed (working days) × work (box height units). In man-days.
  const graphEffort = (box) => round1(elapsedOf(box) * workOf(box));
  // Estimate Effort = manual value if fixed, else equals Graph Effort.
  const estimateEffort = (box) => round1(box.estEffort != null ? box.estEffort : graphEffort(box));
  // Assigned Effort = elapsed × Σ resource %.
  const assignedEffort = (box) => round1(elapsedOf(box) * allocSum(box));
  // Theoretical Elapsed = Estimate Effort ÷ assigned work (Σ %). Null if nobody assigned.
  const theoreticalElapsed = (box) => { const a = allocSum(box); return a > 0 ? round1(estimateEffort(box) / a) : null; };
  // Kept for existing callers (staffing dot, box footer).
  const plannedManDays = (box) => estimateEffort(box);
  const assignedManDays = (box) => assignedEffort(box);

  // Adjust the box LENGTH so that the assigned resources deliver the Estimate Effort:
  //   elapsed = estimateEffort ÷ Σ% ; then convert working days → calendar span (weekends flag).
  const adjustLengthToResources = (box) => {
    const a = allocSum(box);
    if (a <= 0) return;
    const wd = Math.max(1, Math.round(estimateEffort(box) / a));
    const span = businessToSpan(box.x, wd, box.useWeekends);
    updateBox(box.id, { duration: span });

  //  red   = under-staffed (assigned clearly below plan)
  //  green = right-staffed (assigned matches plan)
  //  yellow= over-staffed  (assigned clearly above plan)
  const staffingDot = (box) => {
    const planned = plannedManDays(box);
    const assigned = assignedManDays(box);
    const gap = assigned - planned;
    const tol = Math.max(0.5, planned * 0.05); // 5% tolerance
    if (gap < -tol) return "#E5484D";  // under -> red
    if (gap > tol) return "#EAB308";   // over  -> yellow
    return "#12A594";                  // right -> green
  };

  // Per-period allocation %: for a resource, average daily allocation across the
  // days in a given period (a day the person isn't working = 0%). Values can
  // exceed 100% when tasks overlap — that's an over-allocation signal.
  const allocInRange = (rid, dStart, dEnd) => {
    const rows = assignmentsFor(rid);
    let sum = 0, days = Math.max(1, dEnd - dStart);
    for (let day = dStart; day < dEnd; day++) {
      rows.forEach((row) => { if (day >= row.start && day < row.start + row.duration) sum += row.pct; });
    }
    return Math.round(sum / days);
  };

  // Peak daily allocation % across all of a resource's assignments (their busiest day).
  const resourcePeakPct = (rid) => {
    const rows = assignmentsFor(rid);
    if (!rows.length) return 0;
    const lo = Math.min(...rows.map((r) => r.start));
    const hi = Math.max(...rows.map((r) => r.start + r.duration));
    let peak = 0;
    for (let day = lo; day < hi; day++) {
      let d = 0;
      rows.forEach((row) => { if (day >= row.start && day < row.start + row.duration) d += row.pct; });
      if (d > peak) peak = d;
    }
    return peak;
  };

  const utilizationPct = (r) => clamp(Math.round((resourcePeakPct(r.id) / (r.capacity || 100)) * 100), 0, 999);

    if (!rid) return true;

    return false;
  };

  const totalCapacity = resources.reduce((s, r) => s + r.capacity, 0);
  const totalUsage = resources.reduce((s, r) => s + resourceUsage(r.id), 0);

  const densityHint = { day: "days shown; months banded above", week: "ISO weeks shown; months banded above", month: "months shown; years banded above" }[density];

            <span className="font-display text-white" style={{ fontWeight: 600, fontSize: 15, letterSpacing: "-0.02em" }}>Pulse</span>

                            </div>

                      <button onClick={() => adjustLengthToResources(selectedBox)} disabled={!hasRes}
                        title="Set the box length so the assigned resources deliver the Estimate Effort"
                        className="mono text-xs w-full mt-2 py-1.5 rounded flex items-center justify-center gap-1"
                        style={{ background: hasRes ? "#F7E8DA" : "#F1F5F9", color: hasRes ? "#D85A28" : "#B4BECC", border: "1px solid " + (hasRes ? "#F0A875" : "#E2DFD9") }}>
                        ⇥ adjust length to resources
                      </button>
                      <div className="mono mt-2" style={{ fontSize: 9, color: "#94A3B8" }}>
                        {elapsed}wd over {selectedBox.duration} calendar days · {selectedBox.useWeekends ? "weekends count as working days" : "weekdays only"}.
                      </div>
                      </>
                    );
                  })()}
                  {selectedBox.plannedX != null && (() => {
                    const dStart = selectedBox.x - selectedBox.plannedX;
                    const late = dStart > 0;
                    return (
                      <div className="mt-2 rounded px-2 py-1.5" style={{ background: "#F8FAFC", border: "1px solid #EEF1F4" }}>
                        <div className="flex items-center justify-between">
                          <span className="mono text-xs" style={{ color: "#64748B" }}>PLAN (frozen)</span>
                          <button onClick={() => updateBox(selectedBox.id, { plannedX: undefined, plannedDuration: undefined })} title="Clear the frozen plan"><Icon size={11} color="#94A3B8">✕</Icon></button>
                        </div>
                        <div className="text-xs mt-0.5" style={{ color: "#334155" }}>{fmtDate(selectedBox.plannedX)} → {fmtDate(selectedBox.plannedX + selectedBox.plannedDuration)}</div>
                        <div className="mono text-xs mt-1" style={{ color: dStart === 0 ? "#0F6B5C" : late ? "#9F1D23" : "#0F6B5C", fontWeight: 600 }}>
                          {dStart === 0 ? "✓ started on plan" : late ? `▶ start delayed ${dStart}d` : `◀ started ${-dStart}d early`}

                </div>
                <div>
                  <span className="mono text-xs" style={{ color: "#64748B" }}>STATUS</span>

                    {LABEL_COLORS.map((lc) => {
                      const active = (selectedBox.labelColor || null) === lc.color;
                      return (
                        <button key={lc.id} title={lc.name}
                          onClick={() => updateBox(selectedBox.id, { labelColor: lc.color })}
                          style={{
                            width: 24, height: 24, borderRadius: "50%",
                            background: lc.color || "#fff",
                            border: lc.color ? (active ? "2px solid #123359" : "2px solid #fff") : "1px dashed #CBD5E1",
                            boxShadow: active ? "0 0 0 2px #EE7240" : "0 0 0 1px rgba(15,23,42,0.08)",

                  <input type="checkbox" checked={!!selectedBox.ai} onChange={(e) => updateBox(selectedBox.id, { ai: e.target.checked })} /> AI-assisted estimate <Icon size={13} color="#8B5CF6">✨</Icon>
                </label>

                <Attachments items={selectedBox.attachments} onAdd={(t, u) => addAttachment(selectedBox.id, t, u)} onDelete={(aid) => deleteAttachment(selectedBox.id, aid)} />

                <button onClick={() => { if (window.confirm(`Delete task "${selectedBox.title}"? This can't be undone.`)) deleteTask(selectedBox.id); }}
                  className="mt-1 flex items-center justify-center gap-1.5 w-full py-2 rounded text-xs font-semibold"
                  style={{ background: "#FDEBEC", color: "#9F1D23", border: "1px solid #F5C2C5" }}>
                  <Icon size={13} color="#9F1D23">🗑</Icon> Delete task

        </div>
          </div>
          {/* Center: canvas */}
          <div className="flex-1 flex flex-col overflow-hidden" style={{ background: "#FDFCF8" }}>
          {/* Ruler */}
          <div className="flex flex-shrink-0" style={{ height: RULER_HEIGHT, background: "#FFFFFF", borderBottom: "1px solid #E2DFD9" }}>
            <div style={{ position: "relative", flex: 1, overflow: "hidden", scrollbarGutter: "stable" }}>
            <div style={{ position: "absolute", inset: 0, transform: `scaleX(${viewZoom})`, transformOrigin: "left top" }}>

              <div key={`wr${d}`} style={{ position: "absolute", left: xForDay(d), top: 0, bottom: 0, width: dayWidth, background: "rgba(100,116,139,0.10)" }} />

                <span className="mono text-xs" style={{ color: "#64748B", transform: `scaleX(${1 / viewZoom})`, transformOrigin: "left" }}>{t.label}</span>
              </div>
            ))}
            </div>
            </div>
          </div>

          <div ref={containerRef} className="relative" style={{ flex: "1 1 60%", overflowX: "hidden", overflowY: "auto", scrollbarGutter: "stable", cursor: isPanning ? "grabbing" : "grab", touchAction: "none" }} onPointerDown={handlePanPointerDown} onDoubleClick={(e) => { if (e.target === e.currentTarget || e.target.getAttribute("data-bg")) setViewZoom(1); }}>

              {weekends.map((d) => (
                <div key={`we${d}`} style={{ position: "absolute", left: xForDay(d), top: 0, height: contentHeight, width: dayWidth, background: "rgba(100,116,139,0.10)", pointerEvents: "none" }} />

              {epicBands.map((ep) => {

                return (
                  <div key={ep.id} style={{ position: "absolute", left: bandLeft, top: ep.y0, width: bandWidth, height: ep.y1 - ep.y0, background: hexA(ep.color, 0.05), border: `1px dashed ${hexA(ep.color, 0.5)}`, borderRadius: 10, pointerEvents: "none", zIndex: 1 }}>
                    <div style={{ position: "absolute", top: 6, left: 8, display: "flex", alignItems: "center", gap: 6, pointerEvents: "auto" }}>

                      <input value={ep.name} onChange={(e) => updateEpic(ep.id, { name: e.target.value })}

                        className="mono bg-transparent" style={{ fontSize: 11, fontWeight: 700, color: ep.color, letterSpacing: "0.02em", border: "none", outline: "none", width: Math.max(80, ep.name.length * 7) }} />

                    </div>
                    {/* resize handles */}
                    <div onPointerDown={(e) => startEpicResize("top", ep, e)} title="Resize top" style={{ position: "absolute", top: -4, left: 12, right: 12, height: 8, cursor: "ns-resize", pointerEvents: "auto" }} />
                    <div onPointerDown={(e) => startEpicResize("bottom", ep, e)} title="Resize bottom" style={{ position: "absolute", bottom: -4, left: 12, right: 12, height: 8, cursor: "ns-resize", pointerEvents: "auto" }} />
                    <div onPointerDown={(e) => startEpicResize("left", ep, e)} title="Resize left" style={{ position: "absolute", left: -4, top: 12, bottom: 12, width: 8, cursor: "ew-resize", pointerEvents: "auto" }} />
                    <div onPointerDown={(e) => startEpicResize("right", ep, e)} title="Resize right" style={{ position: "absolute", right: -4, top: 12, bottom: 12, width: 8, cursor: "ew-resize", pointerEvents: "auto" }} />
                    <div onPointerDown={(e) => startEpicResize("bottom right", ep, e)} title="Resize" style={{ position: "absolute", right: -5, bottom: -5, width: 12, height: 12, cursor: "nwse-resize", pointerEvents: "auto", background: hexA(ep.color, 0.5), borderRadius: 3 }} />
                  </div>

              {/* Delay lines: full planned span drawn below the box, with start & end deltas */}
              {showDelays && boxes.filter((b) => b.plannedX != null && b.plannedDuration != null).map((b) => {

                const planLeft = xForDay(pStart);
                const planW = Math.max(2, (pEnd - pStart) * dayWidth);
                const boxBottom = b.y + (epicsShrunk ? 26 : boxHeight(b));

                const dStart = aStart - pStart;               // + = started late

                const endColor = dEnd > 0 ? "#E5484D" : dEnd < 0 ? "#0F6B5C" : "#0F6B5C";
                const aStartX = xForDay(aStart), aEndX = xForDay(aEnd);
                return (
                  <div key={`dl${b.id}`} style={{ position: "absolute", left: 0, top: 0, right: 0, bottom: 0, pointerEvents: "none", zIndex: 4 }}>

                    <div style={{ position: "absolute", left: planLeft, top: lineY - 1.5, width: planW, height: 3, background: "repeating-linear-gradient(90deg,#94A3B8 0,#94A3B8 5px,transparent 5px,transparent 9px)" }} />

                    <div style={{ position: "absolute", left: planLeft - 1, top: lineY - 6, width: 2, height: 12, background: "#94A3B8" }} />
                    <div style={{ position: "absolute", left: planLeft + planW - 1, top: lineY - 6, width: 2, height: 12, background: "#94A3B8" }} />

                    <div style={{ position: "absolute", left: Math.min(planLeft, aStartX), top: lineY - 6, width: Math.abs(aStartX - planLeft), height: 0, borderTop: `2px dotted ${startColor}` }} />
                    <div style={{ position: "absolute", left: Math.min(planLeft + planW, aEndX), top: lineY - 6, width: Math.abs(aEndX - (planLeft + planW)), height: 0, borderTop: `2px dotted ${endColor}` }} />
                    {/* delta labels */}
                    {dStart !== 0 && <span className="mono" style={{ position: "absolute", left: Math.min(planLeft, aStartX) + 2, top: lineY - 20, fontSize: 9, fontWeight: 700, color: startColor, whiteSpace: "nowrap", background: "rgba(255,255,255,0.85)", padding: "0 3px", borderRadius: 2 }}>start {dStart > 0 ? `+${dStart}d` : `${dStart}d`}</span>}
                    {dEnd !== 0 && <span className="mono" style={{ position: "absolute", left: Math.min(planLeft + planW, aEndX) + 2, top: lineY - 20, fontSize: 9, fontWeight: 700, color: endColor, whiteSpace: "nowrap", background: "rgba(255,255,255,0.85)", padding: "0 3px", borderRadius: 2 }}>end {dEnd > 0 ? `+${dEnd}d` : `${dEnd}d`}</span>}
                    {dStart > 0 && dEnd < dStart && <span className="mono" style={{ position: "absolute", left: aEndX + 4, top: lineY - 6, fontSize: 8, fontWeight: 700, color: "#0F6B5C", whiteSpace: "nowrap" }}>▲ {dStart - dEnd}d recovered</span>}
                  </div>

              })}

              {boxes.map((box) => {
                const meta = STATUS_META[box.status];
                const left = xForDay(box.x);
                const width = Math.max(box.duration * dayWidth, 34);
                const top = box.y;
                const hasChildren = Array.isArray(box.children) && box.children.length > 0;
                const expanded = hasChildren && !box.collapsed && !epicsShrunk;
                const bodyHeight = 18 + clamp(workOf(box) / GRAPH.workPerStep, 1, 24) * GRAPH.stepPx;
                const height = epicsShrunk ? 26 : boxHeight(box);
                const unassigned = !box.resources || box.resources.length === 0;
                const selected = selectedId === box.id;
                const dragOver = dragOverBoxId === box.id;
                const matchesRes = boxInvolves(box, filterResource);
                const q = featureQuery.trim().toLowerCase();
                const matchesQuery = !q || (box.title || "").toLowerCase().includes(q) || (box.children || []).some((c) => (c.title || "").toLowerCase().includes(q));
                const matchesStatus = featureStatusFilter === "all" || box.status === featureStatusFilter;
                const matches = matchesRes && matchesQuery && matchesStatus;

                return (
                  <div key={box.id}
                    onPointerDown={(e) => startDrag("move", box, e)}
                    onDragOver={(e) => { e.preventDefault(); setDragOverBoxId(box.id); }}
                    onDragLeave={() => setDragOverBoxId((id) => (id === box.id ? null : id))}
                    onDrop={(e) => { e.preventDefault(); const rid = e.dataTransfer.getData("text/plain"); if (rid) assignResource(box.id, rid); setDragOverBoxId(null); setSelectedId(box.id); setRightTab("details"); }}
                    style={{
                      position: "absolute", left, top, width, height,
                      background: meta.bg,
                      border: `2px ${unassigned ? "dashed" : "solid"} ${dragOver ? "#EE7240" : meta.border}`,
                      borderRadius: 8,
                      boxShadow: dragOver ? "0 0 0 3px rgba(34,211,238,0.35)" : selected ? "0 0 0 2px #EE7240, 0 6px 14px rgba(15,23,42,.15)" : "0 1px 3px rgba(15,23,42,.08)",
                      cursor: dragId === box.id ? "grabbing" : "grab",
                      zIndex: dragId === box.id ? 30 : selected ? 20 : 10,
                      userSelect: "none", overflow: "hidden", touchAction: "none",
                      opacity: matches ? 1 : 0.22,
                      filter: matches ? "none" : "grayscale(0.4)",
                      transition: "opacity .15s",
                    }}>
                    {filterResource && matches && !unassigned && <div style={{ position: "absolute", top: 0, right: 0, background: colorForName(filterResource), color: "#fff", fontSize: 8, fontWeight: 700, padding: "1px 4px", borderBottomLeftRadius: 5 }} className="mono">{filterResource}</div>}
                    {unassigned && <div style={{ position: "absolute", inset: 0, backgroundImage: "repeating-linear-gradient(135deg, rgba(148,163,184,0.18) 0 6px, transparent 6px 12px)", pointerEvents: "none" }} />}
                    {box.labelColor && <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: 4, background: box.labelColor, pointerEvents: "none" }} />}
                    <div className="flex items-center justify-between px-2" style={{ height: 28, borderBottom: "1px solid rgba(15,23,42,0.08)" }}>
                      <div className="flex items-center gap-1 overflow-hidden">
                        {hasChildren && (
                          <button onPointerDown={(e) => e.stopPropagation()} onClick={(e) => toggleCollapsed(box.id, e)} className="flex-shrink-0 flex items-center justify-center" title={expanded ? "Collapse subtasks" : "Expand subtasks"} style={{ width: 22, height: 22, borderRadius: 5, background: hexA(meta.border, 0.15), marginRight: 2 }}><Icon size={17} color={meta.border}>{expanded ? "▾" : "▸"}</Icon></button>
                        )}
                        <span title={(() => { const d = staffingDot(box); return d === "#E5484D" ? "Under-staffed" : d === "#EAB308" ? "Over-staffed" : "Right-staffed"; })()} style={{ width: 9, height: 9, borderRadius: "50%", background: staffingDot(box), flexShrink: 0, border: "1px solid rgba(255,255,255,0.7)", boxShadow: "0 0 0 1px rgba(15,23,42,0.1)" }} />
                        {box.labelColor && <span style={{ width: 7, height: 7, borderRadius: 2, background: box.labelColor, flexShrink: 0 }} />}
                        <span className="text-xs font-semibold truncate" style={{ color: "#1F2330" }}>{box.title}</span>
                      </div>
                      {(box.attachments || []).length > 0 && <span className="mono flex-shrink-0" style={{ fontSize: 9, color: "#D85A28" }} title={`${box.attachments.length} attachment(s)`}>📎{box.attachments.length}</span>}
                      {box.effortLocked && <Icon size={11} color="#D85A28" className="flex-shrink-0">🔒</Icon>}
                      {box.ai && <Icon size={12} color="#8B5CF6" className="flex-shrink-0">✨</Icon>}
                    </div>
                    {epicsShrunk ? null : !expanded ? (
                      <div className="px-2 py-1.5 flex flex-col justify-between" style={{ height: bodyHeight, position: "relative" }}>
                        {/* work units per day implied by the box height */}
                        <div className="mono" title="Work units per day (box height)" style={{ position: "absolute", top: 2, right: 4, fontSize: 9, fontWeight: 700, color: meta.text, opacity: 0.6, pointerEvents: "none" }}>{round1(workOf(box))}/d</div>
                        <div className="flex items-center gap-1 flex-wrap" style={{ overflow: "hidden", position: "relative" }}>
                          {(box.resources || []).map((r) => {
                            const lead = box.lead === r;
                            return (
                              <span key={r} title={`${(resources.find((x) => x.id === r) || {}).name || r}${lead ? " · team leader" : ""}`} className="mono" style={{ fontSize: 9, fontWeight: 700, color: "#fff", background: colorForName(r), width: 17, height: 17, borderRadius: lead ? 4 : "50%", border: lead ? "2px solid #F5A524" : "none", boxSizing: "border-box", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>{r}</span>
                            );
                          })}
                        </div>
                        <div>
                          <div style={{ height: 4, background: "rgba(15,23,42,0.08)", borderRadius: 2, overflow: "hidden" }}>
                            <div style={{ height: "100%", width: `${clamp((assignedManDays(box) / Math.max(0.1, plannedManDays(box))) * 100, 0, 100)}%`, background: meta.border }} />
                          </div>
                          <span className="mono" style={{ fontSize: 9, color: meta.text, opacity: 0.75 }}>{plannedManDays(box)}md est · {assignedManDays(box)}md assigned</span>
                        </div>
                      </div>
                    ) : (
                      <div className="px-2 py-1" style={{ overflow: "hidden" }}>
                        {box.children.map((c) => {
                          const cm = STATUS_META[c.status];
                          return (
                            <div key={c.id} className="flex items-center gap-1.5" style={{ height: 27, borderBottom: "1px solid rgba(15,23,42,0.05)" }}>
                              <span style={{ width: 7, height: 7, borderRadius: "50%", background: cm.border, flexShrink: 0 }} />
                              <span className="text-xs truncate flex-1" style={{ color: "#334155" }}>{c.title}</span>
                              {(!c.resources || c.resources.length === 0) ? <span className="mono" style={{ fontSize: 9, color: "#9F1D23" }}>—</span> : <span className="mono" style={{ fontSize: 9, color: "#64748B" }}>{c.resources.join(", ")}</span>}
                            </div>
                          );
                        })}
                      </div>
                    )}
                    <div onPointerDown={(e) => startDrag("resize-left", box, e)} style={{ position: "absolute", left: -3, top: 0, bottom: 0, width: 7, cursor: "col-resize" }} />
                    <div onPointerDown={(e) => startDrag("resize-right", box, e)} style={{ position: "absolute", right: -3, top: 0, bottom: 0, width: 7, cursor: "col-resize" }} />
                    {!expanded && (
                      <div onPointerDown={(e) => startDrag("resize-effort", box, e)}
                        title="Drag to change length (headcount)"
                        style={{ position: "absolute", left: 0, right: 0, bottom: 0, height: 12, cursor: "ns-resize", display: "flex", alignItems: "flex-end", justifyContent: "center", paddingBottom: 1 }}>
                        <div style={{ width: 26, height: 3, borderRadius: 2, background: meta.border, opacity: 0.5 }} />
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
            </div>
          </div>
          </div>
        </div>

        {/* Lower section: resource assignment (full width) */}
          {/* Divider handle to resize the resource panel by shrinking the canvas */}
          <div onPointerDown={(e) => {
              try { e.currentTarget.setPointerCapture(e.pointerId); } catch (err) {}
              const startY = e.clientY, startH = assignPanelH;
              const mv = (ev) => setAssignPanelH(clamp(startH - (ev.clientY - startY), 90, 620));
              const up = () => { window.removeEventListener("pointermove", mv); window.removeEventListener("pointerup", up); };
              window.addEventListener("pointermove", mv); window.addEventListener("pointerup", up);
            }}
            title="Drag to resize the resource panel"
            style={{ height: 10, background: "#EEF2F7", borderTop: "1px solid #E2DFD9", borderBottom: "1px solid #E2DFD9", cursor: "ns-resize", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
            <div style={{ width: 44, height: 3, borderRadius: 2, background: "#B4BECC" }} />
          </div>

          {/* Resource assignment view (below canvas) — TIME-ALIGNED with the canvas */}
          <div style={{ height: assignPanelH, flexShrink: 0, background: "#FFFFFF", display: "flex", flexDirection: "column" }}>
            <div className="flex items-center justify-between px-4 py-2 border-b flex-shrink-0 flex-wrap gap-2" style={{ borderColor: "#EEF1F4" }}>
              <span className="text-xs font-semibold" style={{ color: "#123359" }}>Assignment by resource{filterResource ? ` — ${(resources.find((x) => x.id === filterResource) || {}).name || filterResource}` : ""}</span>
              <div className="flex items-center gap-2">
                <span className="mono text-xs" style={{ color: "#78859A" }}>filter:</span>
                <select value={assignFilterRes} onChange={(e) => setAssignFilterRes(e.target.value)} className="mono text-xs border rounded px-1.5 py-1" style={{ borderColor: "#E2DFD9", color: "#334155" }}>
                  <option value="all">all people</option>
                  {resources.map((r) => <option key={r.id} value={r.id}>{r.name}</option>)}
                </select>
                <select value={assignFilterStatus} onChange={(e) => setAssignFilterStatus(e.target.value)} className="mono text-xs border rounded px-1.5 py-1" style={{ borderColor: "#E2DFD9", color: "#334155" }}>
                  <option value="all">all statuses</option>
                  {Object.entries(STATUS_META).map(([k, m]) => <option key={k} value={k}>{m.label}</option>)}
                </select>
                <button onClick={() => setAssignAllocFilter((v) => v === "under" ? "all" : "under")} title="Show only under-allocated (<70%)" className="mono text-xs px-2 py-1 rounded border" style={{ borderColor: assignAllocFilter === "under" ? "#12A594" : "#E2DFD9", background: assignAllocFilter === "under" ? "#E6F7F4" : "#fff", color: assignAllocFilter === "under" ? "#0F6B5C" : "#64748B" }}>under</button>
                <button onClick={() => setAssignAllocFilter((v) => v === "over" ? "all" : "over")} title="Show only over-allocated (>100%)" className="mono text-xs px-2 py-1 rounded border" style={{ borderColor: assignAllocFilter === "over" ? "#E5484D" : "#E2DFD9", background: assignAllocFilter === "over" ? "#FDEBEC" : "#fff", color: assignAllocFilter === "over" ? "#9F1D23" : "#64748B" }}>over</button>
                <button onClick={() => setAssignHideIdle((v) => !v)} className="mono text-xs px-2 py-1 rounded border" style={{ borderColor: assignHideIdle ? "#EE7240" : "#E2DFD9", background: assignHideIdle ? "#F7E8DA" : "#fff", color: assignHideIdle ? "#D85A28" : "#64748B" }}>hide idle</button>
                <button onClick={() => setAssignCompact((v) => !v)} title="Show only % per resource (hide task bars)" className="mono text-xs px-2 py-1 rounded border" style={{ borderColor: assignCompact ? "#EE7240" : "#E2DFD9", background: assignCompact ? "#F7E8DA" : "#fff", color: assignCompact ? "#D85A28" : "#64748B" }}>{assignCompact ? "▣ compact" : "▤ compact"}</button>
                {(assignFilterRes !== "all" || assignFilterStatus !== "all" || assignHideIdle) && (
                  <button onClick={() => { setAssignFilterRes("all"); setAssignFilterStatus("all"); setAssignHideIdle(false); }} className="mono text-xs px-2 py-1 rounded" style={{ background: "#F1F5F9", color: "#64748B" }}>clear ✕</button>
                )}
              </div>
            </div>

            {/* mini ruler — same offsetX / dayWidth / viewZoom as the canvas */}
            <div className="flex flex-shrink-0" style={{ borderBottom: "1px solid #F1F5F9" }}>
              <div style={{ width: RES_LABEL_W, flexShrink: 0, borderRight: "1px solid #F1F5F9" }} />
              <div style={{ position: "relative", height: 22, flex: 1, overflow: "hidden", scrollbarGutter: "stable" }}>
                <div style={{ position: "absolute", inset: 0, transform: `scaleX(${viewZoom})`, transformOrigin: "left top" }}>
                  {weekends.map((d) => (
                    <div key={`wm${d}`} style={{ position: "absolute", left: xForDay(d), top: 0, bottom: 0, width: dayWidth, background: "rgba(100,116,139,0.10)" }} />
                  ))}
                  {timeline.secondary.map((t) => (
                    <div key={t.day} style={{ position: "absolute", left: xForDay(t.day), top: 0, bottom: 0, borderLeft: "1px solid #DDE2EA", paddingLeft: 3, display: "flex", alignItems: "center" }}>
                      <span className="mono" style={{ fontSize: 9, color: "#78859A", transform: `scaleX(${1 / viewZoom})`, transformOrigin: "left" }}>{t.label}</span>
                    </div>
                  ))}
                  <div style={{ position: "absolute", left: xForDay(0), top: 0, bottom: 0, width: 2, background: "#EE7240", opacity: 0.6 }} />
                </div>
              </div>
            </div>

            <div className="flex-1 overflow-y-auto overflow-x-hidden" style={{ scrollbarGutter: "stable" }}>
              {resources
                .filter((r) => !filterResource || r.id === filterResource)      // sidebar filter
                .filter((r) => assignFilterRes === "all" || r.id === assignFilterRes) // lower-chart resource filter
                .map((r) => {
                  let rows = assignmentsFor(r.id);
                  if (assignFilterStatus !== "all") rows = rows.filter((row) => row.status === assignFilterStatus);
                  return { r, rows };
                })
                .filter(({ rows }) => !assignHideIdle || rows.length > 0)         // hide-idle toggle
                .filter(({ r }) => {                                              // under / over allocation filter
                  if (assignAllocFilter === "all") return true;
                  const u = utilizationPct(r);
                  if (assignAllocFilter === "under") return u < 70;
                  if (assignAllocFilter === "over") return u > 100;
                  return true;
                })
                .map(({ r, rows }) => {
                  const pct = utilizationPct(r);
                  const totalPct = resourcePeakPct(r.id); // total assigned at the busiest day (sum of tasks)
                  const showPct = assignCompact ? totalPct : pct;
                  const barColor = showPct >= 100 ? "#E5484D" : showPct >= 70 ? "#F5A524" : "#12A594";
                  const stacked = stackRows(rows);
                  const laneCount = stacked.reduce((mx, row) => Math.max(mx, row.lane + 1), 0);
                  const barsHeight = Math.max(30, laneCount * 17 + 8); // grow with number of parallel assignments
                  return (
                    <div key={r.id} className="flex items-stretch border-b" style={{ borderColor: "#F5F6F8" }}>
                      {/* left: identity + load (fixed column, aligned with ruler spacer) */}
                      <div className="flex items-start gap-2 px-3 py-2" style={{ width: RES_LABEL_W, flexShrink: 0, borderRight: "1px solid #F1F5F9" }}>
                        <span className="mono" style={{ fontSize: 10, fontWeight: 700, color: "#fff", background: colorForName(r.id), width: 22, height: 22, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>{r.id}</span>
                        <div className="flex-1 overflow-hidden">
                          <div className="text-xs font-medium truncate" style={{ color: "#1F2330" }}>{r.name}</div>
                          <div className="mono" style={{ fontSize: 9, color: "#64748B" }}>{assignCompact ? "total assigned" : `${rows.length} task${rows.length === 1 ? "" : "s"}`}</div>
                          <div className="flex items-center gap-1.5 mt-0.5">
                            <div style={{ height: 4, background: "#F1F5F9", borderRadius: 3, overflow: "hidden", flex: 1 }}>
                              <div style={{ height: "100%", width: `${clamp(showPct, 0, 100)}%`, background: barColor }} />
                            </div>
                            <span className="mono" style={{ fontSize: 9, fontWeight: 700, color: barColor }}>{showPct}%</span>
                          </div>
                        </div>
                      </div>

                      {/* right: timeline track — bars (hidden in compact) + calendar-aligned % strip */}
                      <div style={{ position: "relative", flex: 1, overflow: "hidden", display: "flex", flexDirection: "column" }}>
                        {!assignCompact && (
                        <div style={{ position: "relative", height: barsHeight, overflow: "hidden" }}>
                          <div style={{ position: "absolute", inset: 0, transform: `scaleX(${viewZoom})`, transformOrigin: "left top" }}>
                          {weekends.map((d) => (
                            <div key={`wb${d}`} style={{ position: "absolute", left: xForDay(d), top: 0, bottom: 0, width: dayWidth, background: "rgba(100,116,139,0.08)" }} />
                          ))}
                          {timeline.secondary.map((t) => (
                            <div key={t.day} style={{ position: "absolute", left: xForDay(t.day), top: 0, bottom: 0, width: 1, background: "#EDEFF2" }} />
                          ))}
                          <div style={{ position: "absolute", left: xForDay(0), top: 0, bottom: 0, width: 1, background: "rgba(34,211,238,0.35)" }} />
                          {stacked.map((row, i) => {
                            const m = STATUS_META[row.status];
                            const bLeft = xForDay(row.start);
                            const bWidth = Math.max(row.duration * dayWidth, 26);
                            return (
                              <div key={i} title={`${row.title} · ${fmtDate(row.start)}→${fmtDate(row.start + row.duration)} · ${row.pct}% time`}
                                style={{ position: "absolute", left: bLeft, top: 4 + row.lane * 17, height: 15, width: bWidth, background: m.bg, border: `1px solid ${m.border}`, borderRadius: 4, display: "flex", alignItems: "center", paddingLeft: 4, overflow: "hidden", whiteSpace: "nowrap", transformOrigin: "left" }}>
                                <span style={{ display: "flex", alignItems: "center", transform: `scaleX(${1 / viewZoom})`, transformOrigin: "left", whiteSpace: "nowrap" }}>
                                  <span style={{ width: 5, height: 5, borderRadius: "50%", background: m.border, flexShrink: 0, marginRight: 4 }} />
                                  <span style={{ fontSize: 10, color: m.text, fontWeight: 500 }}>{row.parent ? `${row.parent} › ` : ""}{row.title}</span>
                                  {bWidth * viewZoom > 60 && <span className="mono" style={{ fontSize: 9, color: m.text, opacity: 0.7, marginLeft: 4 }}>{row.pct}%</span>}
                                </span>
                              </div>
                            );
                          })}
                          </div>
                          {rows.length === 0 && (
                            <span className="mono text-xs" style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", color: "#94A3B8" }}>— idle —</span>
                          )}
                        </div>
                        )}
                        {/* per-period allocation % strip (day / week / month per current scale) */}
                        <div style={{ position: "relative", height: 20, borderTop: "1px dashed #EEF1F4", flexShrink: 0, overflow: "hidden" }}>
                          <div style={{ position: "absolute", inset: 0, transform: `scaleX(${viewZoom})`, transformOrigin: "left top" }}>
                          {periods.map((p, i) => {
                            const a = allocInRange(r.id, p.start, p.end);
                            if (a <= 0) return null;
                            const cellLeft = xForDay(p.start);
                            const cellW = Math.max((p.end - p.start) * dayWidth - 2, 12);
                            const bg = a > 100 ? "#FDEBEC" : a >= 70 ? "#FFF6E2" : "#E6F7F4";
                            const fg = a > 100 ? "#9F1D23" : a >= 70 ? "#92400E" : "#0F6B5C";
                            return (
                              <div key={i} title={`${a}% allocated in this ${density}`} style={{ position: "absolute", left: cellLeft + 1, top: 2, width: cellW, height: 16, background: bg, borderRadius: 3, display: "flex", alignItems: "center", justifyContent: "center", overflow: "hidden" }}>
                                <span className="mono" style={{ fontSize: 9, fontWeight: 700, color: fg, transform: `scaleX(${1 / viewZoom})` }}>{a}%</span>
                              </div>
                            );
                          })}
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                })}
            </div>
          </div>
      </div>

      {dimHint && (
        <div className="mono fixed pointer-events-none px-2 py-1 rounded text-xs font-semibold" style={{ left: dimHint.x + 14, top: dimHint.y + 14, background: "#123359", color: "#F0A875", border: "1px solid #EE7240", zIndex: 100 }}>{dimHint.text}</div>
      )}
    </div>
  );
}

// ISO week number helper
function isoWeek(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil(((d - yearStart) / DAY_MS + 1) / 7);
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<InfiniteCanvasPrototype />);
</script>

<script>
  // Surface any load/transpile errors visibly instead of a blank page
  window.addEventListener("error", function (e) {
    var box = document.getElementById("boot-error");
    if (box) { box.style.display = "block"; box.textContent = "Error: " + (e.message || e.error) + "\n\nIf this mentions a network/CDN failure, check your internet connection — this file loads React, Babel and Tailwind from a CDN on first open."; }
  });
</script>
</body>
